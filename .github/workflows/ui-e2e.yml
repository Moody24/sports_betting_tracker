name: UI E2E + A11y

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ui-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ui_e2e:
    name: Playwright E2E + A11y
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sportsbook_e2e
        options: >-
          --health-cmd "pg_isready -U postgres -d sportsbook_e2e"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      SECRET_KEY: ci-e2e-secret
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/sportsbook_e2e

    steps:
      - name: Checkout code
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4

      - name: Set up Python 3.11
        uses: actions/setup-python@82c7e631bb3cdc910f68e0081d67478d79c6982d # v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Set up Node 20
        uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8 # v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E and accessibility checks
        timeout-minutes: 10
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4
        with:
          name: playwright-report
          path: playwright-report
