name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Run test suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4

      - name: Set up Python 3.11
        uses: actions/setup-python@82c7e631bb3cdc910f68e0081d67478d79c6982d # v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff bandit

      - name: Lint (ruff)
        run: ruff check .

      - name: Security scan (bandit)
        run: bandit -q -r app -x tests -ll  # medium+ severity only

      - name: Run tests
        run: python -m coverage run -m unittest discover -s tests -v
        env:
          SECRET_KEY: ci-test-secret-key-not-for-production

      - name: Coverage report
        run: python -m coverage report --include="app/*" --fail-under=74

  ui_e2e:
    name: UI E2E + A11y
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4

      - name: Set up Python 3.11
        uses: actions/setup-python@82c7e631bb3cdc910f68e0081d67478d79c6982d # v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Set up Node 20
        uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8 # v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E and accessibility checks
        run: npx playwright test
        env:
          SECRET_KEY: ci-e2e-secret
          DATABASE_URL: sqlite:////tmp/e2e.sqlite

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4
        with:
          name: playwright-report
          path: playwright-report
